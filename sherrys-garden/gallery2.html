<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALLERY -+SHERRY's GARDEN+-</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <header class="header">
    <div class="logo"><a href="index.html">SHERRY's GARDEN</a></div>
  </header>

  <input type="checkbox" id="menu-btn-check">
  <label for="menu-btn-check" class="menu-btn"><span></span></label>

  <nav class="menu-content">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#gallery">Gallery</a></li>
      </ul>
  </nav>
  <label for="menu-btn-check" class="menu-background"></label>

  <main class="content">
    
    <div class="title-area">
      <p class="text">GALLERY</p>
    </div>

    <section id="gallery">
      <h2 class="section-title">Gallery</h2>
      <div class="gallery-grid">

        <div class="gallery-item">
          <input type="checkbox" id="pop1" class="pop-check">
          <label for="pop1" class="thumb-label">
            <img src="./Photo thumb/th photo 1.jpg" alt="Gallery 1">
          </label>
          <div class="pop-overlay">
            <label for="pop1" class="pop-img-wrap">
              <img src="./Photo/photo 1.jpg" alt="Gallery 1" class="full-img">
            </label>
          </div>
        </div>

        <div class="gallery-item">
          <input type="checkbox" id="pop2" class="pop-check">
          <label for="pop2" class="thumb-label">
            <img src="./Photo thumb/th photo 2.jpg" alt="Gallery 2">
          </label>
          <div class="pop-overlay">
            <label for="pop2" class="pop-img-wrap">
              <img src="./Photo/photo 2.jpg" alt="Gallery 2" class="full-img">
            </label>
          </div>
        </div>

        <div class="gallery-item">
          <input type="checkbox" id="pop3" class="pop-check">
          <label for="pop3" class="thumb-label">
            <img src="./Photo thumb/th photo 3.jpg" alt="Gallery 3">
          </label>
          <div class="pop-overlay">
            <label for="pop3" class="pop-img-wrap">
              <img src="./Photo/photo 3.jpg" alt="Gallery 3" class="full-img">
            </label>
          </div>
        </div>

        <div class="gallery-item">
          <input type="checkbox" id="pop4" class="pop-check">
          <label for="pop4" class="thumb-label">
            <img src="./Photo thumb/th photo 4.jpg" alt="Gallery 4">
          </label>
          <div class="pop-overlay">
            <label for="pop4" class="pop-img-wrap">
              <img src="./Photo/photo 4.jpg" alt="Gallery 4" class="full-img">
            </label>
          </div>
        </div>

      </div>
    </section>

    <section class="btn-area">
      <div class="btn-wrapper">
        <a class="btn" href="../index.html">Home</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 SHERRY's GARDEN・<a href="../index.html">d0x0bw</a>. All Rights Reserved.</p>
  </footer>

  <a href="#" class="gotop" aria-label="トップへ戻る"><span class="arrow"></span></a>

  <script>
    // --- メニュー・トップ戻りボタンの制御 ---
    const menuCheck = document.getElementById('menu-btn-check');
    const menuLinks = document.querySelectorAll('.menu-content a');
    const menuBg = document.querySelector('.menu-background');

    menuCheck.addEventListener('change', () => {
      document.body.style.overflow = menuCheck.checked ? 'hidden' : '';
    });
    [...menuLinks, menuBg].forEach(el => {
      el.addEventListener('click', () => { 
        menuCheck.checked = false; 
        document.body.style.overflow = ''; 
      });
    });

    const goTopBtn = document.querySelector('.gotop');
    if (goTopBtn) {
      goTopBtn.classList.add('js-hidden');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          goTopBtn.classList.add('is-show');
        } else {
          goTopBtn.classList.remove('is-show');
        }
      });
    }

    // --- ✨ スライド機能＆クリック開閉のバグ修正版スクリプト ---
    document.addEventListener('DOMContentLoaded', () => {
      const popChecks = Array.from(document.querySelectorAll('.pop-check'));
      
      popChecks.forEach((check, index) => {
        const overlay = check.parentElement.querySelector('.pop-overlay');
        if (!overlay) return;

        const prevIndex = (index - 1 + popChecks.length) % popChecks.length;
        const nextIndex = (index + 1) % popChecks.length;

        // 「前へ」ボタンを生成
        const prevBtn = document.createElement('div');
        prevBtn.className = 'pop-nav prev';
        prevBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:40%; height:40%;"><polyline points="15 18 9 12 15 6"></polyline></svg>`;
        prevBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation(); 
          check.checked = false;
          popChecks[prevIndex].checked = true;
          toggleBodyScroll();
        });
        overlay.appendChild(prevBtn);

        // 「次へ」ボタンを生成
        const nextBtn = document.createElement('div');
        nextBtn.className = 'pop-nav next';
        nextBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:40%; height:40%;"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
        nextBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation(); 
          check.checked = false;
          popChecks[nextIndex].checked = true;
          toggleBodyScroll();
        });
        overlay.appendChild(nextBtn);

        // 💡 修正ポイント
        // 「画像そのもの」がクリックされた時だけ、閉じないようにブロックします。
        // これにより、画像の外側の黒い背景（label）をクリックした時は正常に閉じるようになります。
        const img = overlay.querySelector('.full-img');
        if (img) {
          img.addEventListener('click', (e) => {
            e.stopPropagation(); // ◀ 画像クリックのときだけ親（外枠）への連鎖を止める
          });
        }

        // チェックボックス変化時にスクロールを制御
        check.addEventListener('change', toggleBodyScroll);
      });

      function toggleBodyScroll() {
        const anyOpen = popChecks.some(c => c.checked);
        document.body.style.overflow = anyOpen ? 'hidden' : '';
      }

      // キーボード操作（左右矢印でスライド、Escで閉じる）
      document.addEventListener('keydown', (e) => {
        const activeIndex = popChecks.findIndex(c => c.checked);
        if (activeIndex === -1) return;

        if (e.key === 'ArrowRight') {
          popChecks[activeIndex].checked = false;
          popChecks[(activeIndex + 1) % popChecks.length].checked = true;
        } else if (e.key === 'ArrowLeft') {
          popChecks[activeIndex].checked = false;
          popChecks[(activeIndex - 1 + popChecks.length) % popChecks.length].checked = true;
        } else if (e.key === 'Escape') {
          popChecks[activeIndex].checked = false;
        }
        toggleBodyScroll();
      });
    });
  </script>
</body>
</html>
