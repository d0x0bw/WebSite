  <a href="#" class="gotop" aria-label="トップへ戻る"><span class="arrow"></span></a>

  <script>
    const menuCheck = document.getElementById('menu-btn-check');
    const menuLinks = document.querySelectorAll('.menu-content a');
    const menuBg = document.querySelector('.menu-background');

    // --- メニュー開閉時にスクロールを制御 ---
    menuCheck.addEventListener('change', () => {
      if (menuCheck.checked) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    });

    menuLinks.forEach(link => {
      link.addEventListener('click', () => { 
        menuCheck.checked = false; 
        document.body.style.overflow = ''; 
      });
    });

    menuBg.addEventListener('click', () => { 
      menuCheck.checked = false; 
      document.body.style.overflow = ''; 
    });

    // --- トップへ戻るボタンの制御 ---
    const goTopBtn = document.querySelector('.gotop');

    if (goTopBtn) {
      goTopBtn.classList.add('js-hidden');

      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          goTopBtn.classList.add('is-show');
        } else {
          goTopBtn.classList.remove('is-show');
        }
      });
    }

    // --- ギャラリー拡大画面の「前へ」「次へ」スライド機能 ---
    document.addEventListener('DOMContentLoaded', () => {
      // すべてのポップアップ用チェックボックスを取得（Gallery 1 と Gallery 2 の両方に対応）
      const popChecks = Array.from(document.querySelectorAll('.pop-check'));
      
      popChecks.forEach((check, index) => {
        const overlay = check.nextElementSibling;
        if (!overlay || !overlay.classList.contains('pop-overlay')) return;

        // 前の画像・次の画像のインデックスを計算（ループ設定）
        const prevIndex = (index - 1 + popChecks.length) % popChecks.length;
        const nextIndex = (index + 1) % popChecks.length;

        // 「前へ」ボタンを作成して追加
        const prevBtn = document.createElement('div');
        prevBtn.className = 'pop-nav prev';
        prevBtn.innerHTML = '&#10094;'; 
        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation(); // 親（黒背景）のクリックイベントをブロック
          check.checked = false; 
          popChecks[prevIndex].checked = true; 
        });
        overlay.appendChild(prevBtn);

        // 「次へ」ボタンを作成して追加
        const nextBtn = document.createElement('div');
        nextBtn.className = 'pop-nav next';
        nextBtn.innerHTML = '&#10095;'; 
        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation(); // 親（黒背景）のクリックイベントをブロック
          check.checked = false; 
          popChecks[nextIndex].checked = true; 
        });
        overlay.appendChild(nextBtn);

        // 中央の画像（またはそれを囲むlabel）をクリックした時は閉じずに維持する
        const centerLabel = overlay.querySelector('label');
        if (centerLabel) {
          centerLabel.addEventListener('click', (e) => {
            e.stopPropagation(); // 親（黒背景）の「閉じる」処理に流さない
          });
        }
      });

      // --- PC用：キーボードの左右矢印キー（← / →）でのスライド機能 ---
      document.addEventListener('keydown', (e) => {
        // 現在拡大表示されている（チェックが入っている）インデックスを探す
        const activeIndex = popChecks.findIndex(check => check.checked);
        
        // 拡大されている画像がない場合は何もしない
        if (activeIndex === -1) return;

        if (e.key === 'ArrowLeft') {
          // 左矢印キーが押されたら「前へ」
          const prevIndex = (activeIndex - 1 + popChecks.length) % popChecks.length;
          popChecks[activeIndex].checked = false;
          popChecks[prevIndex].checked = true;
        } else if (e.key === 'ArrowRight') {
          // 右矢印キーが押されたら「次へ」
          const nextIndex = (activeIndex + 1) % popChecks.length;
          popChecks[activeIndex].checked = false;
          popChecks[nextIndex].checked = true;
        } else if (e.key === 'Escape') {
          // Escapeキーが押されたら閉じる
          popChecks[activeIndex].checked = false;
        }
      });
    });
  </script>
