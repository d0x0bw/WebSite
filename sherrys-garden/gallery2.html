<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALLERY -+SHERRY's GARDEN+-</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <header class="header">
    <div class="logo"><a href="index.html">SHERRY's GARDEN</a></div>
  </header>

  <input type="checkbox" id="menu-btn-check">
  <label for="menu-btn-check" class="menu-btn"><span></span></label>

  <nav class="menu-content">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#gallery">Gallery</a></li>
      </ul>
  </nav>
  <label for="menu-btn-check" class="menu-background"></label>

  <main class="content">
    
    <div class="title-area">
      <p class="text">GALLERY</p>
    </div>

    <section id="gallery">
      <h2 class="section-title">Gallery</h2>
      <div class="gallery-grid">

        <div class="gallery-item">
          <img src="./Photo thumb/th photo 1.jpg" data-full="./Photo/photo 1.jpg" alt="Gallery 1" class="thumb-img">
        </div>

        <div class="gallery-item">
          <img src="./Photo thumb/th photo 2.jpg" data-full="./Photo/photo 2.jpg" alt="Gallery 2" class="thumb-img">
        </div>

        <div class="gallery-item">
          <img src="./Photo thumb/th photo 3.jpg" data-full="./Photo/photo 3.jpg" alt="Gallery 3" class="thumb-img">
        </div>

        <div class="gallery-item">
          <img src="./Photo thumb/th photo 4.jpg" data-full="./Photo/photo 4.jpg" alt="Gallery 4" class="thumb-img">
        </div>

      </div>
    </section>

    <section class="btn-area">
      <div class="btn-wrapper">
        <a class="btn" href="../index.html">Home</a>
      </div>
    </section>
  </main>

  <div id="custom-lightbox" class="pop-overlay">
    <div class="pop-nav prev">&#10094;</div>
    <div class="pop-img-wrap">
      <img id="lightbox-img" src="" alt="拡大画像">
    </div>
    <div class="pop-nav next">&#10095;</div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 SHERRY's GARDEN・<a href="../index.html">d0x0bw</a>. All Rights Reserved.</p>
  </footer>

  <a href="#" class="gotop" aria-label="トップへ戻る"><span class="arrow"></span></a>

  <script>
    // --- メニュー・トップ戻りボタンの制御 ---
    const menuCheck = document.getElementById('menu-btn-check');
    const menuLinks = document.querySelectorAll('.menu-content a');
    const menuBg = document.querySelector('.menu-background');

    menuCheck.addEventListener('change', () => {
      document.body.style.overflow = menuCheck.checked ? 'hidden' : '';
    });
    [...menuLinks, menuBg].forEach(el => {
      el.addEventListener('click', () => { 
        menuCheck.checked = false; 
        document.body.style.overflow = ''; 
      });
    });

    const goTopBtn = document.querySelector('.gotop');
    if (goTopBtn) {
      goTopBtn.classList.add('js-hidden');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          goTopBtn.classList.add('is-show');
        } else {
          goTopBtn.classList.remove('is-show');
        }
      });
    }

    // --- ✨ 新・確実なギャラリー拡大＆スライド機能 ---
    document.addEventListener('DOMContentLoaded', () => {
      const thumbs = Array.from(document.querySelectorAll('.thumb-img'));
      const lightbox = document.getElementById('custom-lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const prevBtn = lightbox.querySelector('.pop-nav.prev');
      const nextBtn = lightbox.querySelector('.pop-nav.next');
      let currentIndex = 0;

      // 拡大画面を開く関数
      function openLightbox(index) {
        currentIndex = index;
        lightboxImg.src = thumbs[currentIndex].getAttribute('data-full');
        lightbox.classList.add('is-active');
        document.body.style.overflow = 'hidden'; // 背後のスクロールを防ぐ
      }

      // 拡大画面を閉じる関数
      function closeLightbox() {
        lightbox.classList.remove('is-active');
        document.body.style.overflow = '';
      }

      // 次の画像へスライド
      function showNext() {
        currentIndex = (currentIndex + 1) % thumbs.length;
        lightboxImg.src = thumbs[currentIndex].getAttribute('data-full');
      }

      // 前の画像へスライド
      function showPrev() {
        currentIndex = (currentIndex - 1 + thumbs.length) % thumbs.length;
        lightboxImg.src = thumbs[currentIndex].getAttribute('data-full');
      }

      // サムネイルクリックイベント
      thumbs.forEach((thumb, index) => {
        thumb.addEventListener('click', () => openLightbox(index));
      });

      // ナビゲーションボタンのイベント（スマホのタップ・PCのクリック共通）
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });

      // 背景部分（画像の枠外）をクリックしたら閉じる
      lightbox.addEventListener('click', closeLightbox);
      lightboxImg.addEventListener('click', (e) => e.stopPropagation()); // 画像クリックでは閉じない

      // キーボード操作
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('is-active')) return;
        if (e.key === 'ArrowRight') showNext();
        if (e.key === 'ArrowLeft') showPrev();
        if (e.key === 'Escape') closeLightbox();
      });
    });
  </script>
</body>
</html>
