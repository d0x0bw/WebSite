  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      // --- 共通状態管理：スクロールロック ---
      // メニューやモーダルの状態を一括監視してbodyのスクロールを制御
      function updateScrollLock() {
        const menuCheck = document.getElementById('menu-btn-check');
        const anyPopOpen = popChecks.some(c => c.checked);
        
        if ((menuCheck && menuCheck.checked) || anyPopOpen) {
          document.body.classList.add('is-locked');
        } else {
          document.body.classList.remove('is-locked');
        }
      }

      // --- ハンバーガーメニュー制御 ---
      const menuCheck = document.getElementById('menu-btn-check');
      const menuLinks = document.querySelectorAll('.menu-content a');
      const menuBg = document.querySelector('.menu-background');

      if (menuCheck) {
        menuCheck.addEventListener('change', updateScrollLock);
        [...menuLinks, menuBg].forEach(el => {
          el.addEventListener('click', () => { 
            menuCheck.checked = false; 
            updateScrollLock();
          });
        });
      }

      // --- トップ戻りボタン制御 ---
      const goTopBtn = document.querySelector('.gotop');
      if (goTopBtn) {
        goTopBtn.classList.add('js-hidden');
        // 連続スクロール時の負荷を軽減（パッシブイベント）
        window.addEventListener('scroll', () => {
          if (window.scrollY > 300) {
            goTopBtn.classList.add('is-show');
          } else {
            goTopBtn.classList.remove('is-show');
          }
        }, { passive: true });
      }

      // --- ギャラリーモーダル & スライド機能 ---
      const popChecks = Array.from(document.querySelectorAll('.pop-check'));
      
      popChecks.forEach((check, index) => {
        const overlay = check.parentElement.querySelector('.pop-overlay');
        if (!overlay) return;

        const prevIndex = (index - 1 + popChecks.length) % popChecks.length;
        const nextIndex = (index + 1) % popChecks.length;

        // 「前へ」ボタン生成
        const prevBtn = document.createElement('div');
        prevBtn.className = 'pop-nav prev';
        prevBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`;
        prevBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation(); 
          check.checked = false;
          popChecks[prevIndex].checked = true;
          updateScrollLock();
        });
        overlay.appendChild(prevBtn);

        // 「次へ」ボタン生成
        const nextBtn = document.createElement('div');
        nextBtn.className = 'pop-nav next';
        nextBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
        nextBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation(); 
          check.checked = false;
          popChecks[nextIndex].checked = true;
          updateScrollLock();
        });
        overlay.appendChild(nextBtn);

        // 画像そのもののクリックは閉じないようにガード
        const img = overlay.querySelector('.full-img');
        if (img) {
          img.addEventListener('click', (e) => {
            e.stopPropagation();
          });
        }

        // チェックボックス変化時にスクロールを制御
        check.addEventListener('change', updateScrollLock);
      });

      // キーボード操作（左右矢印でスライド、Escで閉じる）
      document.addEventListener('keydown', (e) => {
        const activeIndex = popChecks.findIndex(c => c.checked);
        if (activeIndex === -1) return;

        if (e.key === 'ArrowRight') {
          popChecks[activeIndex].checked = false;
          popChecks[(activeIndex + 1) % popChecks.length].checked = true;
        } else if (e.key === 'ArrowLeft') {
          popChecks[activeIndex].checked = false;
          popChecks[(activeIndex - 1 + popChecks.length) % popChecks.length].checked = true;
        } else if (e.key === 'Escape') {
          popChecks[activeIndex].checked = false;
        }
        updateScrollLock();
      });
    });
  </script>
</body>
