<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スクリプトなし・フレーム風レイアウト（フッター固定版）</title>
  <style>
    /* 全体のリセットと基本配置 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* 画面全体のスクロールを防ぐ */
    }

    /* バーガーメニュー開閉用の隠しチェックボックス */
    #menu-toggle {
      display: none;
    }

    /* メッセージの外側をタップして閉じるための透明カバー（PCでは非表示） */
    .menu-overlay {
      display: none;
    }

    /* 1. ヘッダー（ジャンル・横スクロール） */
    header {
      background: #333;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .genre-links {
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }
    .genre-links a {
      display: inline-block;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      margin-right: 10px;
      background: #555;
      border-radius: 4px;
    }

    /* バーガーボタンのスタイル */
    .burger-btn {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 30px;
      height: 20px;
      cursor: pointer;
      margin-left: 10px;
    }
    .burger-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* 2. 下部レイアウト（左メニュー + メイン） */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 左メニュー */
    nav {
      width: 250px;
      background: #f4f4f4;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 10px;
    }

    /* メニュー内のリンク要素を内包するコンテナ */
    .nav-item {
      position: relative; /* 子要素のlabelを重ねる基準 */
      border-bottom: 1px solid #eee;
    }
    .nav-item a {
      display: block;
      color: #333;
      padding: 10px;
      text-decoration: none;
    }
    .nav-item a:hover { background: #e0e0e0; }

    /* リンクと同じサイズで重なる、メニューを閉じるためのラベル（PCでは無効化） */
    .nav-item .close-trigger {
      display: none;
    }

    /* メイン（作品表示エリア） */
    main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      position: relative;
    }

    /* 3. :target によるコンテンツ切り替え */
    .content-box {
      display: none;
      position: absolute;
      top: 20px; left: 20px; right: 20px;
    }
    #default-content { display: block; }
    .content-box:target { display: block; }
    main:has(:target) #default-content { display: none; }

    /* 4. 固定フッター（ヘッダーと同じ色 #333） */
    footer {
      background: #333;
      color: white;
      padding: 12px 20px;
      text-align: center;
      font-size: 14px;
      position: sticky;
      bottom: 0;
      z-index: 100;
    }


    /* ========================================================
       📲 レスポンシブ対応：画面幅 768px 以下の設定
       ======================================================== */
    @media (max-width: 768px) {
      .burger-btn {
        display: flex;
        z-index: 110;
      }

      /* スマホ時はヘッダーとフッターに挟まれた領域いっぱいに広げる */
      nav {
        position: fixed;
        top: 56px; /* ヘッダーの高さ分下げる */
        left: -250px;
        width: 250px;
        height: calc(100vh - 56px - 45px); /* 🔥100vhからヘッダーとフッターの分を引く */
        z-index: 95;
        box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        transition: left 0.3s ease;
      }

      /* スマホ時のみ、作品リンクの上に「閉じる用ラベル」を透明にして重ねる */
      .nav-item .close-trigger {
        display: block;
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 2; /* リンク（aタグ）より前面に置く */
        cursor: pointer;
      }
      .nav-item a {
        position: relative;
        z-index: 1; /* labelの裏に配置 */
      }

      /* 背景の暗幕（メニュー外をタップして閉じる用） */
      .menu-overlay {
        display: block;
        position: fixed;
        top: 56px;
        left: 0;
        width: 100%;
        height: calc(100vh - 56px - 45px); /* 暗幕もヘッダーとフッターの間に収める */
        background: rgba(0, 0, 0, 0.4);
        z-index: 90;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      /* 魔法のCSS：チェックボックスON時の挙動 */
      #menu-toggle:checked ~ .container nav { left: 0; }
      #menu-toggle:checked ~ .menu-overlay {
        opacity: 1;
        pointer-events: auto;
      }

      /* バーガーボタン変形 */
      #menu-toggle:checked ~ header .burger-btn span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
      #menu-toggle:checked ~ header .burger-btn span:nth-child(2) { opacity: 0; }
      #menu-toggle:checked ~ header .burger-btn span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

      .content-box {
        position: static;
      }
    }
  </style>
</head>
<body>

  <input type="checkbox" id="menu-toggle">

  <label for="menu-toggle" class="menu-overlay"></label>

  <header>
    <div class="genre-links">
      <a href="#genre1-menu">ジャンルA</a>
      <a href="#genre2-menu">ジャンルB</a>
      <a href="#genre3-menu">ジャンルC</a>
      <a href="#genre4-menu">ジャンルD</a>
    </div>
    
    <label for="menu-toggle" class="burger-btn">
      <span></span>
      <span></span>
      <span></span>
    </label>
  </header>

  <div class="container">
    <nav>
      <div class="nav-item">
        <label for="menu-toggle" class="close-trigger"></label>
        <a href="#work1">作品 A-1</a>
      </div>
      
      <div class="nav-item">
        <label for="menu-toggle" class="close-trigger"></label>
        <a href="#work2">作品 A-2</a>
      </div>
      
      <div class="nav-item">
        <label for="menu-toggle" class="close-trigger"></label>
        <a href="#work3">作品 A-3</a>
      </div>

      <script>
        for(let i=4; i<=20; i++) {
          document.write(`
            <div class="nav-item">
              <label for="menu-toggle" class="close-trigger"></label>
              <a href="#work${i}">作品 A-${i}</a>
            </div>
          `);
        }
      </script>
    </nav>

    <main>
      <div id="default-content" class="content-box">
        <h2>ようこそ</h2>
        <p>上のジャンルを選び、メニューから作品を選択してください。</p>
      </div>

      <div id="work1" class="content-box">
        <h2>作品 A-1</h2>
        <p>ここに作品A-1の本文が入ります。</p>
      </div>

      <div id="work2" class="content-box">
        <h2>作品 A-2</h2>
        <p>ここに作品A-2の本文が入ります。</p>
      </div>

      <div id="work3" class="content-box">
        <h2>作品 A-3</h2>
        <p>ここに作品A-3の本文が入ります。</p>
      </div>
    </main>
  </div>

  <footer>
    <p>&copy; 2026 スクリプトなしサイト. All Rights Reserved.</p>
  </footer>

</body>
</html>
